<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال توسعه | وب‌سایت در حال آماده‌سازی است</title>
    <style>
        :root {
            --primary-color: #0ea5a4;
            --primary-light: #14b8a6;
            --primary-gradient: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            --bg-dark: #0f172a;
            --text-white: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* افکت بک‌گراند برای قشنگی کار */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            top: 20%;
            left: 25%;
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 1;
            max-width: 600px;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 20px;
            margin: 0 auto 2rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(14, 165, 164, 0.3);
            animation: pulse 2s infinite;
        }

        .logo-placeholder svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(20, 184, 166, 0.1);
            color: var(--primary-light);
            border: 1px solid rgba(20, 184, 166, 0.2);
            margin-bottom: 1.5rem;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            display: block;
            width: 40px;
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 2px;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes loading {
            0% { transform: translateX(160px); }
            100% { transform: translateX(-40px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">به‌زودی بازمی‌گردیم</div>
        
        <div class="logo-placeholder">
            <svg viewBox="0 0 24 24">
                <path d="M12,3V11.23C11.53,11.08 11,11 10.5,11A3.5,3.5 0 0,0 7,14.5A3.5,3.5 0 0,0 10.5,18A3.5,3.5 0 0,0 14,14.5V6H19V3H12Z"/>
            </svg>
        </div>

        <h1>سایت در حال توسعه است</h1>
        <p>ما در حال کار روی بخش‌های جدید پروژه هستیم تا تجربه بهتری برای شما رقم بزنیم. به‌زودی با امکانات خفن و آهنگ‌های جدید برمی‌گردیم!</p>
        
        <div class="loading-bar"></div>
    </div>

</body>
</html>
