<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آوا سنتر | در حال توسعه</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .loader {
            border: 4px solid #21262d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ip-box {
            background-color: #21262d;
            border: 1px solid #30363d;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.95rem;
            color: #8b949e;
        }

        .ip-value {
            font-family: monospace;
            color: #79c0ff;
            font-weight: bold;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>آوا سنتر</h1>
        <p>وب‌سایت در حال حاضر در دست تعمیر و توسعه است. به‌زودی با امکانات جدید بازمی‌گردیم!</p>
        
        <div class="ip-box">
            <span>آی‌پی شما:</span>
            <span id="user-ip" class="ip-value">در حال دریافت...</span>
        </div>
    </div>

    <script>
        // اسکریپت دریافت آی‌پی کاربر با استفاده از API رایگان ipify
        fetch('https://api.ipify.org?format=json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('شبکه با خطا مواجه شد');
                }
                return response.json();
            })
            .then(data => {
                // نمایش آی‌پی روی صفحه
                document.getElementById('user-ip').innerText = data.ip;
                // چاپ آی‌پی در کنسول مرورگر
                console.log("آی‌پی واقعی کاربر:", data.ip);
            })
            .catch(error => {
                document.getElementById('user-ip').innerText = "ناموفق";
                console.error("خطا در دریافت آی‌پی:", error);
            });
    </script>

</body>
</html>
