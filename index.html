<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آوا سنتر | در حال توسعه</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            user-select: none; /* جلوگیری از سلکت شدن متن روی صفحه */
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        p {
            color: #8b949e;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .loader {
            border: 4px solid #21262d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #secret-name {
            display: none;
            font-size: 3rem;
            color: #ff7b72;
            margin-top: 25px;
            font-weight: bold;
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 0 15px rgba(255, 123, 114, 0.4);
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>آوا سنتر</h1>
        <p>وب‌سایت در حال حاضر در دست تعمیر و توسعه است. به‌زودی با امکانات جدید بازمی‌گردیم!</p>
        
        <div id="secret-name">مهربد❤️</div>
    </div>

    <script>
        // تابع فعال‌سازی ایستراگ روی صفحه
        function activateSecret() {
            const secretDiv = document.getElementById('secret-name');
            secretDiv.style.display = 'block';
            document.querySelector('.container').style.borderColor = '#ff7b72';
        }

        // ۱. بررسی کلیدهای کیبورد (کامپیوتر و لپ‌تاپ)
        document.addEventListener('keydown', function(event) {
            // اضافه شدن کلید 'ئ' به شرط‌های قبلی
            if (event.key === 'm' || event.key === 'M' || event.key === 'p' || event.key === 'پ' || event.key === 'ئ') {
                activateSecret();
            }
        });

        // ۲. لمس سه‌تایی برای گوشی‌های موبایل
        let clickCount = 0;
        let lastClickTime = 0;

        document.addEventListener('click', function() {
            const currentTime = new Date().getTime();
            
            if (currentTime - lastClickTime < 400) {
                clickCount++;
            } else {
                clickCount = 1;
            }
            
            lastClickTime = currentTime;

            if (clickCount === 3) {
                activateSecret();
                clickCount = 0;
            }
        });
    </script>

</body>
</html>
